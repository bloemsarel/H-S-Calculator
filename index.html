@media only screen and (max-width: 480px) {
    body {
        padding: 10px;
    }
    .tab-content {
        padding: 15px;
    }
    h1 {
        font-size: 1.5em; /* Reduced font size */
    }
    h2 {
        font-size: 1.2em; /* Reduced font size */
    }
    p {
        font-size: 0.9em; /* Reduced font size */
    }
}
