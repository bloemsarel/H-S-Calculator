<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>H-S Fluid Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --accent: #38bdf8;
      --accent-soft: rgba(56, 189, 248, 0.15);
      --text: #e5e7eb;
      --muted: #9ca3af;
      --danger: #f97373;
      --border: #1f2937;
      --radius: 12px;
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1f2937 0, #020617 55%, #000 100%);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 12px;
    }

    .app {
      width: 100%;
      max-width: 480px;
      margin: 8px auto;
      background: linear-gradient(145deg, #020617, #020617);
      border-radius: 20px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(148, 163, 184, 0.15);
      overflow: hidden;
    }

    header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .title-block {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    h1 {
      font-size: 1.1rem;
      margin: 0;
      letter-spacing: 0.03em;
    }

    .subtitle {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .pill {
      font-size: 0.7rem;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      color: var(--muted);
      white-space: nowrap;
    }

    main {
      padding: 10px 14px 14px;
    }

    .section-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 8px 2px 4px;
    }

    .card {
      background: radial-gradient(circle at top left, #020617 0, #020617 40%, #020617 100%);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 10px 10px 8px;
      margin-bottom: 10px;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }

    label {
      font-size: 0.8rem;
      color: var(--muted);
    }

    input[type="number"],
    select,
    input[type="search"] {
      width: 100%;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #020617;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
    }

    input::placeholder {
      color: #4b5563;
    }

    input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.4);
    }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    button {
      border-radius: 999px;
      border: none;
      padding: 9px 12px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.1s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #0ea5e9, #22c55e);
      color: #0b1120;
      box-shadow: 0 8px 18px rgba(34, 197, 94, 0.35);
      flex: 1;
    }

    .btn-secondary {
      background: rgba(15, 23, 42, 0.9);
      color: var(--muted);
      border: 1px solid var(--border);
      flex: 1;
    }

    button:active {
      transform: translateY(1px) scale(0.99);
      box-shadow: none;
    }

    .quick-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }

    .quick-btn {
      padding: 5px 9px;
      font-size: 0.7rem;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      background: rgba(15, 23, 42, 0.9);
      color: var(--muted);
      cursor: pointer;
    }

    .quick-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .results {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      margin-top: 4px;
    }

    .result-chip {
      background: rgba(15, 23, 42, 0.9);
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 6px 8px;
      font-size: 0.75rem;
    }

    .result-label {
      color: var(--muted);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .result-value {
      font-size: 0.9rem;
      margin-top: 2px;
    }

    .fluid-card {
      margin-top: 6px;
      padding: 8px 9px;
      border-radius: 10px;
      background: radial-gradient(circle at top left, var(--accent-soft), #020617 55%);
      border: 1px solid rgba(56, 189, 248, 0.4);
      font-size: 0.8rem;
    }

    .fluid-title {
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .fluid-line {
      margin: 2px 0;
    }

    .warning {
      margin-top: 4px;
      padding: 6px 7px;
      border-radius: 8px;
      background: rgba(248, 113, 113, 0.08);
      border: 1px solid rgba(248, 113, 113, 0.5);
      color: #fecaca;
      font-size: 0.75rem;
    }

    .warning strong {
      color: #fecaca;
    }

    .muted-note {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .error {
      color: var(--danger);
      font-size: 0.8rem;
      margin-top: 4px;
    }

    @media (max-width: 360px) {
      header {
        flex-direction: column;
        align-items: flex-start;
      }
      .btn-row {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="title-block">
        <h1>H-S Fluid Calculator</h1>
        <div class="subtitle">Holliday–Segar + 20&nbsp;mL/kg • IV fluid suggestions</div>
      </div>
      <div class="pill">Paeds & Adults</div>
    </header>

    <main>
      <!-- Weight & calculate -->
      <div class="section-label">Patient</div>
      <div class="card">
        <div class="row">
          <label for="weight">Weight (kg)</label>
        </div>
        <div class="row">
          <input
            id="weight"
            type="number"
            min="0"
            step="0.1"
            inputmode="decimal"
            placeholder="Enter weight in kilograms"
          />
        </div>
        <div class="btn-row">
          <button class="btn-primary" id="btn-calc">
            <span>Calculate volume</span>
          </button>
          <button class="btn-secondary" id="btn-reset">
            Reset
          </button>
        </div>
        <div id="error" class="error" style="display:none;"></div>
      </div>

      <!-- Diagnosis selection -->
      <div class="section-label">Diagnosis / context</div>
      <div class="card">
        <label for="diagnosis">Select diagnosis</label>
        <div class="row">
          <select id="diagnosis">
            <option value="">— None / not specified —</option>
            <option value="hemorrhage">Blood loss (hemorrhage)</option>
            <option value="vomiting">Vomiting</option>
            <option value="diarrhea">Diarrhea</option>
            <option value="dka">Diabetes / DKA</option>
            <option value="shock">Cardiogenic / neurogenic shock</option>
            <option value="reduced_intake">Reduced intake (elderly)</option>
            <option value="heat">Heat dehydration</option>
            <option value="burns">Excessive burns</option>
            <option value="sepsis">Sepsis / septic shock</option>
            <option value="postop">Postoperative patient</option>
            <option value="renal">Renal impairment</option>
            <option value="hepatic">Hepatic failure</option>
          </select>
        </div>

        <label for="search" style="margin-top:6px;">Search diagnoses</label>
        <div class="row">
          <input id="search" type="search" placeholder="Type to filter (e.g. 'sepsis', 'burns')" />
        </div>

        <div class="quick-buttons" id="quick-buttons">
          <button class="quick-btn" data-dx="hemorrhage">Hemorrhage</button>
          <button class="quick-btn" data-dx="vomiting">Vomiting</button>
          <button class="quick-btn" data-dx="diarrhea">Diarrhea</button>
          <button class="quick-btn" data-dx="dka">DKA</button>
          <button class="quick-btn" data-dx="sepsis">Sepsis</button>
          <button class="quick-btn" data-dx="burns">Burns</button>
        </div>

        <div class="muted-note">
          Choice of fluid is a guide only and must be adapted to clinical status, labs, and local protocols.
        </div>
      </div>

      <!-- Results -->
      <div class="section-label">Calculated volumes</div>
      <div class="card">
        <div class="results">
          <div class="result-chip">
            <div class="result-label">Daily requirement</div>
            <div class="result-value" id="daily">—</div>
          </div>
          <div class="result-chip">
            <div class="result-label">Hourly rate</div>
            <div class="result-value" id="hourly">—</div>
          </div>
          <div class="result-chip">
            <div class="result-label">Rehydration (20 mL/kg)</div>
            <div class="result-value" id="rehydration">—</div>
          </div>
          <div class="result-chip">
            <div class="result-label">Weight</div>
            <div class="result-value" id="weight-display">—</div>
          </div>
        </div>

        <div id="fluid-card" class="fluid-card" style="display:none;">
          <div class="fluid-title" id="fluid-title"></div>
          <div class="fluid-line" id="fluid-first"></div>
          <div class="fluid-line" id="fluid-alt"></div>
          <div class="warning" id="fluid-warning" style="display:none;"></div>
        </div>
      </div>
    </main>
  </div>

  <script>
    // Fluid recommendations from your document
    const fluidData = {
      hemorrhage: {
        title: "Blood loss (hemorrhage)",
        first: "First line: Ringer’s Lactate (RL) or Normal Saline (NS).",
        alt: "Colloids or blood products may be required depending on severity.",
        warning: "Monitor haemodynamics closely; consider early blood products in major haemorrhage."
      },
      vomiting: {
        title: "Vomiting",
        first: "First line: Normal Saline (NS).",
        alt: "Alternative: RL if metabolic alkalosis suspected.",
        warning: "Monitor potassium replacement and acid–base status."
      },
      diarrhea: {
        title: "Diarrhea",
        first: "First line: Oral Rehydration Solution (ORS) if mild/moderate.",
        alt: "Severe: NS or RL IV.",
        warning: "Replace potassium losses and monitor for ongoing stool losses."
      },
      dka: {
        title: "Diabetes & Diabetic Ketoacidosis (DKA)",
        first: "First line: Balsol or Plasmalyte B (balanced crystalloids preferred).",
        alt: "Alternative: NS initially if balanced solutions unavailable.",
        warning: "Careful monitoring of glucose, potassium, and acid–base status is essential."
      },
      shock: {
        title: "Cardiogenic & neurogenic shock",
        first: "First line: NS or RL cautiously.",
        alt: "Vasopressors are often required in addition to fluids.",
        warning: "Avoid fluid overload; titrate to perfusion and use invasive monitoring where available."
      },
      reduced_intake: {
        title: "Reduced intake of fluids (especially in the aged)",
        first: "First line: NS or RL for gentle maintenance.",
        alt: "",
        warning: "Adjust rate for renal and cardiac function; avoid fluid overload."
      },
      heat: {
        title: "Heat dehydration",
        first: "First line: ORS (oral) if possible.",
        alt: "Severe: NS or RL IV.",
        warning: "Monitor sodium and avoid overly rapid correction of hypernatremia."
      },
      burns: {
        title: "Excessive burns",
        first: "First line: RL (Parkland formula guidance).",
        alt: "",
        warning: "Strict monitoring of urine output and electrolytes; reassess frequently."
      },
      sepsis: {
        title: "Sepsis / septic shock",
        first: "Preferred: RL or Plasmalyte B (balanced crystalloids).",
        alt: "",
        warning: "Follow sepsis bundles; reassess fluid responsiveness and avoid fluid overload."
      },
      postop: {
        title: "Postoperative patients",
        first: "NS or RL for maintenance.",
        alt: "Adjust for surgical and insensible losses.",
        warning: "Review daily; avoid unnecessary positive fluid balance."
      },
      renal: {
        title: "Renal impairment",
        first: "Avoid potassium-containing fluids unless levels are low.",
        alt: "NS is often preferred; tailor to labs and urine output.",
        warning: "Monitor potassium and volume status closely; consider nephrology input."
      },
      hepatic: {
        title: "Hepatic failure",
        first: "Prefer NS.",
        alt: "Avoid lactate-containing fluids if severe liver dysfunction.",
        warning: "Monitor sodium, lactate, and volume status; risk of ascites and hyponatremia."
      }
    };

    function hollidaySegar(weightKg) {
      if (weightKg <= 0 || isNaN(weightKg)) {
        throw new Error("Weight must be greater than zero.");
      }
      let daily;
      if (weightKg <= 10) {
        daily = weightKg * 100;
      } else if (weightKg <= 20) {
        daily = 10 * 100 + (weightKg - 10) * 50;
      } else {
        daily = 10 * 100 + 10 * 50 + (weightKg - 20) * 20;
      }
      const hourly = daily / 24;
      return {
        daily: Math.round(daily * 10) / 10,
        hourly: Math.round(hourly * 100) / 100
      };
    }

    const weightInput = document.getElementById("weight");
    const btnCalc = document.getElementById("btn-calc");
    const btnReset = document.getElementById("btn-reset");
    const errorEl = document.getElementById("error");

    const dailyEl = document.getElementById("daily");
    const hourlyEl = document.getElementById("hourly");
    const rehydEl = document.getElementById("rehydration");
    const weightDisplayEl = document.getElementById("weight-display");

    const dxSelect = document.getElementById("diagnosis");
    const searchInput = document.getElementById("search");
    const quickButtons = document.getElementById("quick-buttons");

    const fluidCard = document.getElementById("fluid-card");
    const fluidTitle = document.getElementById("fluid-title");
    const fluidFirst = document.getElementById("fluid-first");
    const fluidAlt = document.getElementById("fluid-alt");
    const fluidWarning = document.getElementById("fluid-warning");

    function clearResults() {
      dailyEl.textContent = "—";
      hourlyEl.textContent = "—";
      rehydEl.textContent = "—";
      weightDisplayEl.textContent = "—";
      fluidCard.style.display = "none";
      fluidWarning.style.display = "none";
      errorEl.style.display = "none";
      errorEl.textContent = "";
    }

    function showFluid(dxKey) {
      const data = fluidData[dxKey];
      if (!data) {
        fluidCard.style.display = "none";
        return;
      }
      fluidTitle.textContent = data.title;
      fluidFirst.textContent = data.first || "";
      fluidAlt.textContent = data.alt || "";
      if (data.warning) {
        fluidWarning.style.display = "block";
        fluidWarning.innerHTML = "<strong>⚠️ Warning:</strong> " + data.warning;
      } else {
        fluidWarning.style.display = "none";
      }
      fluidCard.style.display = "block";
    }

    function calculate() {
      const w = parseFloat(weightInput.value);
      if (isNaN(w) || w <= 0) {
        errorEl.textContent = "Please enter a valid weight in kilograms.";
        errorEl.style.display = "block";
        clearResults();
        return;
      }
      errorEl.style.display = "none";

      try {
        const res = hollidaySegar(w);
        const rehyd = w * 20;

        dailyEl.textContent = res.daily.toFixed(1) + " mL/day";
        hourlyEl.textContent = res.hourly.toFixed(2) + " mL/hr";
        rehydEl.textContent = rehyd.toFixed(1) + " mL";
        weightDisplayEl.textContent = w.toFixed(1) + " kg";
      } catch (e) {
        errorEl.textContent = e.message;
        errorEl.style.display = "block";
        clearResults();
        return;
      }

      const dxKey = dxSelect.value;
      if (dxKey) {
        showFluid(dxKey);
      } else {
        fluidCard.style.display = "none";
      }
    }

    function resetAll() {
      weightInput.value = "";
      dxSelect.value = "";
      searchInput.value = "";
      clearResults();
      weightInput.focus();
    }

    // Diagnosis search: filter select options
    function filterDiagnoses(term) {
      const lower = term.toLowerCase();
      for (const opt of dxSelect.options) {
        if (!opt.value) {
          opt.hidden = false;
          continue;
        }
        const text = opt.text.toLowerCase();
        opt.hidden = !text.includes(lower);
      }
    }

    // Event wiring
    btnCalc.addEventListener("click", calculate);
    btnReset.addEventListener("click", resetAll);

    weightInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        calculate();
      }
    });

    dxSelect.addEventListener("change", () => {
      const dxKey = dxSelect.value;
      if (dxKey) {
        showFluid(dxKey);
      } else {
        fluidCard.style.display = "none";
      }
    });

    searchInput.addEventListener("input", (e) => {
      filterDiagnoses(e.target.value);
    });

    quickButtons.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-dx]");
      if (!btn) return;
      const dxKey = btn.getAttribute("data-dx");
      dxSelect.value = dxKey;
      showFluid(dxKey);
    });

    // Initial focus for quick use on phone
    window.addEventListener("load", () => {
      weightInput.focus();
    });
  </script>
</body>
</html>
